spring:
  datasource:
    url: jdbc:postgresql://db-brasil:5432/futurekawa_br
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

futurekawa:
  country: BR
  init-script-path: db/scripts/seed_brasil.sql
  temperature-ideal: 29.0
  humidity-ideal: 55.0
  temperature-tolerance: 3.0
  humidity-tolerance: 2.0
  alert:
    recipient: alerts-br@futurekawa.com
