name: Build, Push & Deploy Brasil Images

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on semantic version tags: v1.0.0, v1.2.3, etc.

env:
  REGISTRY: ghcr.io
  ORG: altitude-0

jobs:
  # ── JOB 1: Build and push the images ─────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      image_tag:             ${{ steps.meta.outputs.tag }}
      image_brasil_core:     ${{ steps.meta.outputs.image_brasil_core }}
      image_brasil_alerting: ${{ steps.meta.outputs.image_brasil_alerting }}
      image_brasil_mqtt:     ${{ steps.meta.outputs.image_brasil_mqtt }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract semantic version tag
        id: meta
        run: |
          TAG=${GITHUB_REF_NAME}   # e.g. v1.2.3
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image_brasil_core=${{ env.REGISTRY }}/${{ env.ORG }}/fk-brasil-core:${TAG}" >> $GITHUB_OUTPUT
          echo "image_brasil_alerting=${{ env.REGISTRY }}/${{ env.ORG }}/fk-brasil-alerting:${TAG}" >> $GITHUB_OUTPUT
          echo "image_brasil_mqtt=${{ env.REGISTRY }}/${{ env.ORG }}/fk-brasil-mqtt:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      # Configure Maven to read from GitHub Packages using the standard GITHUB_TOKEN
      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${{ github.actor }}</username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml

      # Compile and package without running tests
      - name: Build Projects with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the three images
      - name: Build and push — Brasil Core
        uses: docker/build-push-action@v5
        with:
          context: ./fk-brasil-core
          file: ./fk-brasil-core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_brasil_core }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Brasil Alerting
        uses: docker/build-push-action@v5
        with:
          context: ./fk-brasil-alerting
          file: ./fk-brasil-alerting/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_brasil_alerting }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — Brasil MQTT
        uses: docker/build-push-action@v5
        with:
          context: ./fk-brasil-mqtt
          file: ./fk-brasil-mqtt/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_brasil_mqtt }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 2: SSH into control node and run Ansible ─────────────────────────
  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Trigger Ansible deployment over SSH
        env:
          IMAGE_BRASIL_CORE:     ${{ needs.build-and-push.outputs.image_brasil_core }}
          IMAGE_BRASIL_ALERTING: ${{ needs.build-and-push.outputs.image_brasil_alerting }}
          IMAGE_BRASIL_MQTT:     ${{ needs.build-and-push.outputs.image_brasil_mqtt }}
        run: |
          ssh ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
            "cd /path/to/altitude0_infra && \
             ansible-playbook -i ansible/inventory.ini ansible/deploy-apps.yml \
               -e 'core_brasil_image=${IMAGE_BRASIL_CORE}' \
               -e 'alerting_brasil_image=${IMAGE_BRASIL_ALERTING}' \
               -e 'mqtt_service_brasil_image=${IMAGE_BRASIL_MQTT}'"